workflows:
  build-unsigned-ipa:
    name: Build Unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 90

    environment:
      node: v20.12.2
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Nuvio.xcworkspace"
        XCODE_SCHEME: "Nuvio"
        BUNDLE_ID: "com.nuvio.hub"
        # Prevents the Sentry symbol-upload build phase from exiting non-zero
        # when SENTRY_AUTH_TOKEN is not configured (unsigned IPA flow).
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
        SENTRY_NO_PROGRESS_BAR: "1"

    cache:
      cache_paths:
        - node_modules
        - ios/Pods
        - ~/Library/Caches/CocoaPods
        - ../KSPlayer

    scripts:
      - name: Install Node dependencies
        script: |
          set -e
          npm install --legacy-peer-deps

      - name: Clone KSPlayer (pinned to v1.1.0)
        script: |
          set -e
          # Clone KSPlayer at the exact tag matching Podfile.lock (v1.1.0).
          # This tag has DisplayCriteria.podspec; newer main commits removed it.
          KSPLAYER_TAG="1.1.0"

          # If cache is missing or DisplayCriteria.podspec is absent, re-clone.
          if [ ! -d "../KSPlayer" ] || [ ! -f "../KSPlayer/DisplayCriteria.podspec" ]; then
            echo "KSPlayer cache invalid or missing DisplayCriteria.podspec — cloning tag $KSPLAYER_TAG..."
            rm -rf ../KSPlayer
            git clone --depth 1 --branch "$KSPLAYER_TAG" \
              https://github.com/kingslay/KSPlayer.git ../KSPlayer
          else
            echo "KSPlayer v$KSPLAYER_TAG found in cache with DisplayCriteria.podspec — skipping clone."
          fi

          # Fail fast with a clear error rather than a confusing CocoaPods message.
          if [ ! -f "../KSPlayer/DisplayCriteria.podspec" ]; then
            echo "ERROR: DisplayCriteria.podspec still missing after clone!"
            ls ../KSPlayer/*.podspec 2>/dev/null || echo "No .podspec files found in ../KSPlayer"
            exit 1
          fi
          echo "Verified: DisplayCriteria.podspec present."

      - name: Install CocoaPods
        script: |
          set -e
          cd ios

          # Deintegrate to clear stale linkage, but KEEP Podfile.lock so
          # CocoaPods resolves the exact same pod versions without drifting
          # to a newer KSPlayer that dropped DisplayCriteria.podspec.
          pod deintegrate || true

          pod install

      - name: Build Archive (Unsigned)
        script: |
          set -e
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            | xcpretty --utf --color && exit ${PIPESTATUS[0]}

      - name: Package Unsigned IPA
        script: |
          set -e
          APP_PATH="$CM_BUILD_DIR/build.xcarchive/Products/Applications/Nuvio.app"

          echo "App bundle contents:"
          ls -R "$APP_PATH/PlugIns" 2>/dev/null || echo "No app extensions found."

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          zip -r "Nuvio-unsigned.ipa" Payload
          rm -rf Payload

          echo "Unsigned IPA is ready: Nuvio-unsigned.ipa"

    artifacts:
      - Nuvio-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log
