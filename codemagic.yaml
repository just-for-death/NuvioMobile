workflows:
  build-unsigned-ipa:
    name: Build Unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: v20.12.2
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Nuvio.xcworkspace"
        XCODE_SCHEME: "Nuvio"
    caching:
      cache_paths:
        - node_modules
        - ios/Pods
        - ~/Library/Caches/CocoaPods
        - ../KSPlayer
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Clone KSPlayer dependency
        script: |
          set -e
          if [ ! -d "../KSPlayer" ]; then
            echo "KSPlayer not found in cache. Cloning..."
            cd .. && git clone --depth 1 https://github.com/kingslay/KSPlayer.git
          else
            echo "KSPlayer found in cache. Skipping clone."
          fi
      - name: Install CocoaPods
        script: |
          set -e
          cd ios
          pod install
      - name: Build Archive (Unsigned)
        script: |
          set -e
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
      - name: Create Unsigned IPA
        script: |
          set -e
          mkdir -p Payload
          # Copy the main app bundle
          cp -R "$CM_BUILD_DIR/build.xcarchive/Products/Applications/Nuvio.app" Payload/
          
          # Verify and list contents for debugging
          ls -R Payload/Nuvio.app/PlugIns || echo "No extensions found in archive!"
          
          # Create the final IPA
          zip -r "unsigned_build.ipa" Payload
          rm -rf Payload
    artifacts:
      - unsigned_build.ipa
