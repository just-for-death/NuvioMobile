workflows:
  ios-release:
    name: Build Signed Release IPA
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - ios-signing # Group containing App Store Connect API keys
      vars:
        XCODE_WORKSPACE: "ios/Nuvio.xcworkspace"
        XCODE_SCHEME: "Nuvio"
        BUNDLE_ID: "com.nuvio.hub"
      node: v20.12.2
      xcode: latest
      cocoapods: default
    scripts:
      - name: Initialize keychain
        script: |
          keychain initialize
      - name: Fetch Apple certificates and profiles
        script: |
          # The following variables must be set in Codemagic environment:
          # APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Clone KSPlayer dependency
        script: |
          cd .. && git clone https://github.com/kingslay/KSPlayer.git
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build IPA for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "ios/ExportOptions.plist"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

  build-unsigned-ipa:
    name: Build Unsigned IPA
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/Nuvio.xcworkspace"
        XCODE_SCHEME: "Nuvio"
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Clone KSPlayer dependency
        script: |
          cd .. && git clone https://github.com/kingslay/KSPlayer.git
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build Archive (Unsigned)
        script: |
          # Use a standard xcodebuild archive command that captures all linked targets
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
      - name: Create Unsigned IPA
        script: |
          # Robustly package the IPA including all extensions and processed assets
          set -e
          mkdir -p Payload
          # Copy the main app bundle
          cp -R "$CM_BUILD_DIR/build.xcarchive/Products/Applications/Nuvio.app" Payload/
          
          # Verify and list contents for debugging
          ls -R Payload/Nuvio.app/PlugIns || echo "No extensions found in archive!"
          
          # Create the final IPA
          zip -r "unsigned_build.ipa" Payload
          rm -rf Payload
    artifacts:
      - unsigned_build.ipa
