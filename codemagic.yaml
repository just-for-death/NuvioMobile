workflows:
  build-unsigned-ipa:
    name: Build Unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 90

    environment:
      node: v20.12.2
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "ios/Nuvio.xcworkspace"
        XCODE_SCHEME: "Nuvio"
        BUNDLE_ID: "com.nuvio.hub"
        # Prevents the Sentry symbol-upload build phase from exiting non-zero
        # when SENTRY_AUTH_TOKEN is not configured (unsigned IPA flow).
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
        SENTRY_NO_PROGRESS_BAR: "1"

    cache:
      cache_paths:
        - node_modules
        - ios/Pods
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Install Node dependencies
        script: |
          set -e
          npm install --legacy-peer-deps

      - name: Install CocoaPods
        script: |
          set -e
          cd ios

          # Deintegrate to clear stale linkage, but KEEP Podfile.lock so
          # CocoaPods resolves the exact same pod versions without drifting
          # to a newer KSPlayer that dropped DisplayCriteria.podspec.
          pod deintegrate || true

          pod install

      - name: Download Metal Toolchain
        script: |
          # KSPlayer includes Metal shaders; the Metal compiler toolchain is not
          # installed by default on Codemagic Mac mini instances.
          xcodebuild -downloadComponent MetalToolchain || true

      - name: Build Archive (Unsigned)
        script: |
          set -eo pipefail
          mkdir -p /tmp/xcodebuild_logs

          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/build.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            MTL_ENABLE_DEBUG_INFO=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log

      - name: Package Unsigned IPA
        script: |
          set -e
          APP_PATH="$CM_BUILD_DIR/build.xcarchive/Products/Applications/Nuvio.app"

          echo "App bundle contents:"
          ls -R "$APP_PATH/PlugIns" 2>/dev/null || echo "No app extensions found."

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          zip -r "Nuvio-unsigned.ipa" Payload
          rm -rf Payload

          echo "Unsigned IPA is ready: Nuvio-unsigned.ipa"

    artifacts:
      - Nuvio-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log
